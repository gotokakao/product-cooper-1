<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리얼 물리 로또 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎰 REAL 물리 추첨기</h1>

    <div class="machine-wrapper">
        <div class="dome-container">
            <canvas id="simCanvas" width="280" height="280"></canvas>
            <div class="dome-glass-shade"></div>
        </div>
        <div class="machine-bottom"></div>
    </div>

    <div class="tray" id="resultTray">
        </div>

    <button id="drawBtn" onclick="startDrawing()">추첨 시작!</button>

    <div class="contact-section">
        <h2>🤝 제휴 문의</h2>
        <p>함께 협력할 파트너를 찾고 있습니다. 아래 양식을 작성해 주세요.</p>
        <form action="https://formspree.io/f/xojpread" method="POST" id="contactForm">
            <div class="input-group">
                <input type="text" name="name" placeholder="성함 / 회사명" required>
            </div>
            <div class="input-group">
                <input type="email" name="email" placeholder="이메일 주소" required>
            </div>
            <div class="input-group">
                <textarea name="message" placeholder="문의 내용 (제휴 내용, 기간 등)" rows="4" required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
